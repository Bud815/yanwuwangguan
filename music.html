<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>🎵 言雾的留声机</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,"Noto Serif SC","Microsoft YaHei",serif;
  background:#f5efe6;
  min-height:100vh;
  color:#4a3728;
  padding:0 0 80px;
  background-image:radial-gradient(circle at 30% 20%, rgba(200,170,140,0.1) 0%, transparent 50%),
                   radial-gradient(circle at 70% 80%, rgba(200,170,140,0.06) 0%, transparent 50%);
  overflow-x:hidden;
}
.header{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px 0;
  position:sticky;top:0;z-index:10;
  background:linear-gradient(180deg,#f5efe6 60%,transparent);
}
.header h1{font-size:16px;font-weight:600;color:#5a4030;letter-spacing:1px;}
.header-actions{display:flex;gap:8px}
.header-actions button{
  background:rgba(196,166,122,0.15);
  border:1px solid rgba(196,166,122,0.2);
  border-radius:10px;
  padding:6px 12px;
  font-size:12px;cursor:pointer;
  color:#7a6a5a;transition:all 0.2s;
}
.header-actions button:active{background:rgba(196,166,122,0.3);}
.search-wrap{padding:10px 16px;position:sticky;top:42px;z-index:9;background:linear-gradient(180deg,#f5efe6 60%,transparent);}
.search-box{
  display:flex;gap:8px;
  background:rgba(255,255,255,0.7);
  border:1px solid rgba(196,166,122,0.25);
  border-radius:12px;
  padding:4px 4px 4px 14px;
  backdrop-filter:blur(4px);
}
.search-box input{flex:1;border:none;outline:none;background:transparent;font-size:13px;color:#4a3728;font-family:inherit;}
.search-box input::placeholder{color:#b0a090}
.search-box button{background:#c4a67a;border:none;border-radius:9px;padding:8px 14px;font-size:12px;color:#fff;cursor:pointer;transition:background 0.2s;}
.search-box button:active{background:#b08e62}
.player-wrap{padding:20px 16px;text-align:center;}
.disc{
  width:200px;height:200px;margin:0 auto 16px;border-radius:50%;
  background:linear-gradient(135deg,#e8d5b7,#d4b896);
  box-shadow:0 8px 40px rgba(196,166,122,0.3),inset 0 0 0 6px rgba(255,255,255,0.5);
  display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
}
.disc img{width:100%;height:100%;border-radius:50%;object-fit:cover;display:block;}
.disc .placeholder{font-size:48px;opacity:0.5;}
.disc.paused img{animation-play-state:paused}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.disc.playing img{animation:spin 12s linear infinite}
.disc-center{position:absolute;width:28px;height:28px;background:rgba(245,239,230,0.85);border-radius:50%;border:2px solid rgba(196,166,122,0.4);z-index:2;}
.song-info{margin-bottom:12px;}
.song-info .name{font-size:16px;font-weight:600;color:#4a3728;}
.song-info .artist{font-size:12px;color:#a09080;margin-top:2px;}
.progress-wrap{max-width:300px;margin:0 auto 16px;display:flex;align-items:center;gap:10px;font-size:11px;color:#a09080;}
.progress-bar{flex:1;height:3px;-webkit-appearance:none;appearance:none;background:rgba(196,166,122,0.2);border-radius:2px;outline:none;}
.progress-bar::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;background:#c4a67a;border-radius:50%;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,0.1);cursor:pointer;}
.controls{display:flex;align-items:center;justify-content:center;gap:24px;}
.controls button{background:none;border:none;font-size:18px;cursor:pointer;color:#7a6a5a;width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:all 0.2s;}
.controls button:active{background:rgba(196,166,122,0.2)}
.controls .play-btn{width:56px;height:56px;background:#c4a67a;color:#fff;font-size:22px;box-shadow:0 4px 16px rgba(196,166,122,0.4);}
.controls .play-btn:active{background:#b08e62}
.lyrics-wrap{padding:0 20px 20px;max-height:200px;overflow-y:auto;scroll-behavior:smooth;mask-image:linear-gradient(180deg,transparent,#000 15%,#000 85%,transparent);-webkit-mask-image:linear-gradient(180deg,transparent,#000 15%,#000 85%,transparent);}
.lyrics-wrap::-webkit-scrollbar{display:none}
.lyric-line{font-size:13px;color:#b0a090;text-align:center;padding:6px 0;transition:all 0.3s;line-height:1.6;}
.lyric-line.active{color:#4a3728;font-size:14px;font-weight:500;}
.panel-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(74,55,40,0.3);z-index:20;}
.panel-overlay.show{display:block}
.panel{
  position:fixed;top:50%;left:50%;
  width:90%;max-width:440px;max-height:75vh;
  background:#f5efe6;border-radius:16px;
  z-index:21;padding:16px 0 24px;
  transform:translate(-50%,-50%) scale(0.92);
  transition:all 0.25s ease;
  box-shadow:0 8px 40px rgba(74,55,40,0.15);
  opacity:0;pointer-events:none;
}
.panel.show{transform:translate(-50%,-50%) scale(1);opacity:1;pointer-events:auto;}
.panel .handle{width:32px;height:3px;background:rgba(196,166,122,0.3);border-radius:2px;margin:0 auto 12px;}
.panel .panel-header{display:flex;align-items:center;justify-content:space-between;padding:0 16px 10px;font-size:14px;font-weight:600;color:#5a4030;}
.panel .panel-header button{background:none;border:none;font-size:16px;color:#a09080;cursor:pointer;}
.panel .list{overflow-y:auto;max-height:calc(75vh - 60px);}
.list-item{display:flex;align-items:center;padding:10px 16px;cursor:pointer;transition:background 0.2s;gap:10px;}
.list-item:active{background:rgba(196,166,122,0.1)}
.list-item img{width:40px;height:40px;border-radius:6px;object-fit:cover;background:#e8d5b7;}
.list-item .info{flex:1;min-width:0}
.list-item .info .title{font-size:13px;color:#4a3728;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.list-item .info .sub{font-size:11px;color:#a09080;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bottom-bar{display:none;position:fixed;bottom:0;left:0;right:0;background:rgba(245,239,230,0.95);backdrop-filter:blur(10px);border-top:1px solid rgba(196,166,122,0.15);padding:8px 16px;z-index:15;align-items:center;gap:10px;}
.bottom-bar.show{display:flex}
.bottom-bar .mini-cover{width:36px;height:36px;border-radius:6px;object-fit:cover;background:#e8d5b7;}
.bottom-bar .mini-info{flex:1;min-width:0}
.bottom-bar .mini-info .name{font-size:12px;color:#4a3728;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bottom-bar .mini-info .artist{font-size:10px;color:#a09080;}
.bottom-bar .mini-btn{background:none;border:none;font-size:20px;color:#7a6a5a;cursor:pointer;width:36px;height:36px;display:flex;align-items:center;justify-content:center;}
@media(max-width:400px){.disc{width:160px;height:160px}.disc .placeholder{font-size:36px}}
</style>
</head>
<body>
<div class="header">
  <h1>🎵 留声机</h1>
  <div class="header-actions">
    <button id="btnPlaylists">📋 歌单</button>
    <button id="btnSearchList">🔍 结果</button>
  </div>
</div>
<div class="search-wrap">
  <div class="search-box">
    <input id="searchInput" type="text" placeholder="搜歌..." />
    <button id="btnSearch">搜</button>
  </div>
</div>
<div class="player-wrap">
  <div class="disc playing" id="disc">
    <img id="coverImg" src="" alt="cover" style="display:none" />
    <span class="placeholder" id="coverPlaceholder">🎵</span>
    <div class="disc-center"></div>
  </div>
  <div class="song-info">
    <div class="name" id="songName">未播放</div>
    <div class="artist" id="songArtist">选一首歌开始吧</div>
  </div>
  <div class="progress-wrap">
    <span id="timeCurrent">00:00</span>
    <input class="progress-bar" type="range" min="0" max="100" value="0" id="progressBar" />
    <span id="timeTotal">00:00</span>
  </div>
  <div class="controls">
    <button id="btnPrev">⏮</button>
    <button class="play-btn" id="btnPlay">▶</button>
    <button id="btnNext">⏭</button>
  </div>
</div>
<div class="lyrics-wrap" id="lyricsWrap">
  <div class="lyric-line active" style="color:#a09080">🎧 等待播放...</div>
</div>
<div class="bottom-bar" id="bottomBar">
  <img class="mini-cover" id="miniCover" src="" alt="" />
  <div class="mini-info">
    <div class="name" id="miniName">未播放</div>
    <div class="artist" id="miniArtist"></div>
  </div>
  <button class="mini-btn" id="miniPlayPause">▶</button>
</div>
<div class="panel-overlay" id="panelOverlay"></div>
<div class="panel" id="panelPlaylists">
  <div class="handle"></div>
  <div class="panel-header"><span>📋 歌单</span><button id="closePlaylists">✕</button></div>
  <div class="list" id="playlistList"></div>
</div>
<div class="panel" id="panelPlaylistDetail">
  <div class="handle"></div>
  <div class="panel-header"><span id="playlistDetailTitle">歌单</span><button id="closePlaylistDetail">✕</button></div>
  <div class="list" id="playlistDetailList"></div>
</div>
<div class="panel" id="panelSearch">
  <div class="handle"></div>
  <div class="panel-header"><span>🔍 搜索结果</span><button id="closeSearch">✕</button></div>
  <div class="list" id="searchResultList"></div>
</div>
<script>
var state={q:'',songs:[],playlists:[],currentPlaylistId:null,playlistSongs:[]};
var player={songId:null,name:'',artist:'',cover:'',duration:0,url:null,lyrics:[],playing:false,currentTime:0,audio:null,lyricIndex:-1};
var disc=document.getElementById('disc');
var coverImg=document.getElementById('coverImg');
var coverPlaceholder=document.getElementById('coverPlaceholder');
var songName=document.getElementById('songName');
var songArtist=document.getElementById('songArtist');
var progressBar=document.getElementById('progressBar');
var timeCurrent=document.getElementById('timeCurrent');
var timeTotal=document.getElementById('timeTotal');
var btnPlay=document.getElementById('btnPlay');
var btnPrev=document.getElementById('btnPrev');
var btnNext=document.getElementById('btnNext');
var lyricsWrap=document.getElementById('lyricsWrap');
var bottomBar=document.getElementById('bottomBar');
var miniCover=document.getElementById('miniCover');
var miniName=document.getElementById('miniName');
var miniArtist=document.getElementById('miniArtist');
var miniPlayPause=document.getElementById('miniPlayPause');
var panelOverlay=document.getElementById('panelOverlay');
var panelPlaylists=document.getElementById('panelPlaylists');
var panelPlaylistDetail=document.getElementById('panelPlaylistDetail');
var panelSearch=document.getElementById('panelSearch');
function fmt(sec){if(!sec||isNaN(sec))return'00:00';var m=Math.floor(sec/60);var s=Math.floor(sec%60);return(m+'').padStart(2,'0')+':'+(s+'').padStart(2,'0');}
function hideAllPanels(){panelOverlay.classList.remove('show');panelPlaylists.classList.remove('show');panelPlaylistDetail.classList.remove('show');panelSearch.classList.remove('show');}
function showPanel(p){hideAllPanels();panelOverlay.classList.add('show');p.classList.add('show');}
panelOverlay.addEventListener('click',hideAllPanels);
document.getElementById('closePlaylists').addEventListener('click',hideAllPanels);
document.getElementById('closePlaylistDetail').addEventListener('click',hideAllPanels);
document.getElementById('closeSearch').addEventListener('click',hideAllPanels);
function api(path){return fetch(path).then(function(r){return r.json()});}
document.getElementById('btnPlaylists').addEventListener('click',function(){loadPlaylists();showPanel(panelPlaylists);});
function loadPlaylists(){var list=document.getElementById('playlistList');list.innerHTML='<div class="list-item" style="justify-content:center;color:#a09080">加载中...</div>';api('/api/music/playlists').then(function(data){state.playlists=data.playlists||[];if(!state.playlists.length){list.innerHTML='<div class="list-item" style="justify-content:center;color:#a09080">暂无歌单</div>';return;}list.innerHTML=state.playlists.map(function(p){return'<div class="list-item" data-id="'+p.id+'"><img src="'+(p.coverImg||'')+'" alt="" /><div class="info"><div class="title">'+p.name+'</div><div class="sub">'+p.trackCount+' 首</div></div><div class="extra">›</div></div>';}).join('');list.querySelectorAll('.list-item').forEach(function(item){item.addEventListener('click',function(){var id=parseInt(item.dataset.id);loadPlaylistDetail(id);});});}).catch(function(){list.innerHTML='<div class="list-item" style="justify-content:center;color:#a09080">加载失败</div>';});}
function loadPlaylistDetail(id){state.currentPlaylistId=id;var detailList=document.getElementById('playlistDetailList');var detailTitle=document.getElementById('playlistDetailTitle');detailList.innerHTML='<div class="list-item" style="justify-content:center;color:#a09080">加载中...</div>';showPanel(panelPlaylistDetail);api('/api/music/playlist/detail?id='+id).then(function(data){var pl=data.playlist||{};detailTitle.textContent=pl.name||'歌单';var tracks=pl.tracks||[];state.playlistSongs=tracks;if(!tracks.length){detailList.innerHTML='<div class="list-item" style="justify-content:center;color:#a09080">歌单是空的</div>';return;}detailList.innerHTML=tracks.map(function(t,i){var artists=(t.ar||[]).map(function(a){return a.name}).join('/');return'<div class="list-item" data-index="'+i+'"><img src="'+(t.al?.picUrl||'')+'?param=80x80" alt="" /><div class="info"><div class="title">'+t.name+'</div><div class="sub">'+artists+'</div></div><div class="extra">🎵</div></div>';}).join('');detailList.querySelectorAll('.list-item').forEach(function(item){item.addEventListener('click',function(){var idx=parseInt(item.dataset.index);var song=tracks[idx];hideAllPanels();playSong(song.id,song.name,(song.ar||[]).map(function(a){return a.name}).join('/'),song.al?.picUrl||'',song.dt);});});}).catch(function(){detailList.innerHTML='<div class="list-item" style="justify-content:center;color:#a09080">加载失败</div>';});}
document.getElementById('btnSearch').addEventListener('click',doSearch);
document.getElementById('searchInput').addEventListener('keydown',function(e){if(e.key==='Enter')doSearch();});
document.getElementById('btnSearchList').addEventListener('click',function(){if(state.songs.length)showPanel(panelSearch);});
function doSearch(){var q=document.getElementById('searchInput').value.trim();if(!q)return;state.q=q;var list=document.getElementById('searchResultList');list.innerHTML='<div class="list-item" style="justify-content:center;color:#a09080">搜索中...</div>';showPanel(panelSearch);api('/api/music/search?keyword='+encodeURIComponent(q)).then(function(data){var songs=data.result?.songs||[];state.songs=songs;if(!songs.length){list.innerHTML='<div class="list-item" style="justify-content:center;color:#a09080">没找到</div>';return;}list.innerHTML=songs.map(function(s,i){var artists=(s.ar||[]).map(function(a){return a.name}).join('/');return'<div class="list-item" data-index="'+i+'"><img src="'+(s.al?.picUrl||'')+'?param=80x80" alt="" /><div class="info"><div class="title">'+s.name+'</div><div class="sub">'+artists+'</div></div><div class="extra">🎵</div></div>';}).join('');list.querySelectorAll('.list-item').forEach(function(item){item.addEventListener('click',function(){var idx=parseInt(item.dataset.index);var song=songs[idx];hideAllPanels();playSong(song.id,song.name,(song.ar||[]).map(function(a){return a.name}).join('/'),song.al?.picUrl||'',song.dt);});});}).catch(function(){list.innerHTML='<div class="list-item" style="justify-content:center;color:#a09080">搜索失败</div>';});}
function playSong(id,name,artist,cover,duration){player.songId=id;player.name=name;player.artist=artist;player.cover=cover;player.duration=duration?Math.floor(duration/1000):0;player.lyrics=[];player.lyricIndex=-1;player.currentTime=0;songName.textContent=name||'未知';songArtist.textContent=artist||'';miniName.textContent=name||'未知';miniArtist.textContent=artist||'';timeTotal.textContent=fmt(player.duration);timeCurrent.textContent='00:00';progressBar.max=player.duration||100;progressBar.value=0;if(cover){var imgUrl=cover+'?param=300x300';coverImg.src=imgUrl;coverImg.style.display='block';coverPlaceholder.style.display='none';miniCover.src=imgUrl;}else{coverImg.style.display='none';coverPlaceholder.style.display='block';miniCover.src='';}bottomBar.classList.add('show');lyricsWrap.innerHTML='<div class="lyric-line" style="color:#a09080">加载歌词...</div>';api('/api/music/lyric?id='+id).then(function(data){var lrc=data.lrc?.lyric||'';if(lrc){player.lyrics=parseLyrics(lrc);renderLyrics();}else{lyricsWrap.innerHTML='<div class="lyric-line" style="color:#a09080">暂无歌词</div>';}}).catch(function(){lyricsWrap.innerHTML='<div class="lyric-line" style="color:#a09080">歌词加载失败</div>';});api('/api/music/song/url?id='+id).then(function(data){var url=data.data?.[0]?.url||null;if(url){player.url=url;if(player.audio){player.audio.pause();player.audio.src='';}player.audio=new Audio(url);player.audio.addEventListener('timeupdate',onTimeUpdate);player.audio.addEventListener('ended',onEnded);player.audio.addEventListener('loadedmetadata',function(){if(!player.duration)player.duration=player.audio.duration;timeTotal.textContent=fmt(player.audio.duration);progressBar.max=player.audio.duration;});player.audio.play().then(function(){player.playing=true;updatePlayBtn();disc.classList.remove('paused');disc.classList.add('playing');}).catch(function(){lyricsWrap.innerHTML='<div class="lyric-line" style="color:#a09080">⚠️ 播放失败，可能需要VIP</div>';});}else{lyricsWrap.innerHTML='<div class="lyric-line" style="color:#a09080">⚠️ 无法获取播放链接</div>';}}).catch(function(){lyricsWrap.innerHTML='<div class="lyric-line" style="color:#a09080">⚠️ 获取播放链接失败</div>';});}
function parseLyrics(lrcStr){var lines=lrcStr.split('\\n');var result=[];for(var i=0;i<lines.length;i++){var line=lines[i].trim();if(!line)continue;var match=line.match(/\\[(\\d{2}):(\\d{2})\\.?(\\d{0,3})\\](.*)/);if(match){var sec=parseInt(match[1])*60+parseInt(match[2])+parseInt(match[3]||'0')/1000;result.push({time:sec,text:match[4]?.trim()||''});}}return result;}
function renderLyrics(){if(!player.lyrics.length){lyricsWrap.innerHTML='<div class="lyric-line" style="color:#a09080">纯音乐 / 暂无歌词</div>';return;}lyricsWrap.innerHTML=player.lyrics.map(function(l){return'<div class="lyric-line" data-time="'+l.time+'">'+l.text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')+'</div>';}).join('');}
function onTimeUpdate(){if(!player.audio)return;var t=player.audio.currentTime;player.currentTime=t;timeCurrent.textContent=fmt(t);progressBar.value=t;var idx=-1;for(var i=player.lyrics.length-1;i>=0;i--){if(t>=player.lyrics[i].time){idx=i;break;}}if(idx!==player.lyricIndex){player.lyricIndex=idx;var lines=lyricsWrap.querySelectorAll('.lyric-line');lines.forEach(function(l){l.classList.remove('active')});if(idx>=0&&idx<lines.length){lines[idx].classList.add('active');var scrollTo=lines[idx];lyricsWrap.scrollBy({top:scrollTo.offsetTop-lyricsWrap.scrollTop-lyricsWrap.clientHeight/2+14,behavior:'smooth'});}}}
function onEnded(){player.playing=false;updatePlayBtn();disc.classList.add('paused');disc.classList.remove('playing');}
function updatePlayBtn(){var icon=player.playing?'⏸':'▶';btnPlay.textContent=icon;miniPlayPause.textContent=player.playing?'⏸':'▶';}
btnPlay.addEventListener('click',function(){if(!player.audio)return;if(player.playing){player.audio.pause();player.playing=false;disc.classList.add('paused');disc.classList.remove('playing');}else{player.audio.play();player.playing=true;disc.classList.remove('paused');disc.classList.add('playing');}updatePlayBtn();});
miniPlayPause.addEventListener('click',function(e){e.stopPropagation();btnPlay.click();});
progressBar.addEventListener('input',function(){if(!player.audio)return;player.audio.currentTime=parseFloat(progressBar.value);timeCurrent.textContent=fmt(player.audio.currentTime);});
bottomBar.addEventListener('click',function(){document.querySelector('.player-wrap').scrollIntoView({behavior:'smooth'});});
api('/api/music/playlists').then(function(data){state.playlists=data.playlists||[];});
</script>
</body>
</html>
